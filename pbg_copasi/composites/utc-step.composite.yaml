name: utc-step
description: "COPASI UTC trajectory: runs a full time-course simulation via CopasiUTCStep and emits the numeric result (time points + species matrix) to the RAM emitter."
tags: [systems-biology, copasi, sbml, ode, demo]

requires:
  processes: [CopasiUTCStep, RAMEmitter]

parameters:
  model_source:
    type: string
    default: "${model_dir}/repressilator.xml"
    description: "Path or URL to an SBML/COPASI model file. Defaults to the bundled Repressilator (BIOMD0000000012)."
  time:
    type: float
    default: 10.0
    description: "Simulation end time in model time units."
  n_points:
    type: int
    default: 11
    description: "Number of output time points (intervals = n_points - 1)."

state:
  copasi_utc:
    _type: step
    address: "local:CopasiUTCStep"
    config:
      model_source: "${model_source}"
      time: "${time}"
      n_points: "${n_points}"
    inputs:
      species_concentrations: ["stores", "species_concentrations"]
      species_counts: ["stores", "species_counts"]
    outputs:
      result: ["stores", "result"]
  stores:
    species_concentrations: {}
    species_counts: {}
    result: {}
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit: {}
    inputs:
      result: ["stores", "result"]
