name: utc-process
description: "COPASI incremental UTC process: advances simulation state one interval at a time via CopasiUTCProcess, emitting species concentrations and reaction fluxes each step."
tags: [systems-biology, copasi, sbml, ode, incremental]

requires:
  processes: [CopasiUTCProcess, RAMEmitter]

parameters:
  model_source:
    type: string
    default: "${model_dir}/repressilator.xml"
    description: "Path or URL to an SBML/COPASI model file. Defaults to the bundled Repressilator (BIOMD0000000012)."
  time:
    type: float
    default: 1.0
    description: "Duration per process update in model time units."
  intervals:
    type: int
    default: 10
    description: "Number of internal integration intervals per update."

state:
  copasi_utc_process:
    _type: process
    address: "local:CopasiUTCProcess"
    config:
      model_source: "${model_source}"
      time: "${time}"
      intervals: "${intervals}"
    inputs:
      species_concentrations: ["stores", "species_concentrations"]
      species_counts: ["stores", "species_counts"]
    outputs:
      species_concentrations: ["stores", "species_concentrations"]
      fluxes: ["stores", "fluxes"]
      time: ["stores", "time"]
    interval: "${time}"
  stores:
    species_concentrations: {}
    species_counts: {}
    fluxes: {}
    time: []
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit:
        species_concentrations: "map[float]"
        fluxes: "map[float]"
    inputs:
      species_concentrations: ["stores", "species_concentrations"]
      fluxes: ["stores", "fluxes"]
