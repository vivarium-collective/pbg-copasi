name: steady-state
description: "COPASI steady-state solver: computes equilibrium species concentrations and reaction fluxes via CopasiSteadyStateStep. Emits the full results dict to the RAM emitter."
tags: [systems-biology, copasi, sbml, steady-state]

requires:
  processes: [CopasiSteadyStateStep, RAMEmitter]

parameters:
  model_source:
    type: string
    default: "${model_dir}/repressilator.xml"
    description: "Path or URL to an SBML/COPASI model file. Defaults to the bundled Repressilator (BIOMD0000000012)."

state:
  copasi_ss:
    _type: step
    address: "local:CopasiSteadyStateStep"
    config:
      model_source: "${model_source}"
    inputs:
      species_concentrations: ["ss_stores", "species_concentrations"]
      counts: ["ss_stores", "counts"]
    outputs:
      results: ["ss_stores", "results"]
  ss_stores:
    species_concentrations: {}
    counts: {}
    results: {}
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit: {}
    inputs:
      results: ["ss_stores", "results"]
